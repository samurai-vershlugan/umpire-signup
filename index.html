<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRGS Umpire Sign-Up</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2e45;
    --navy-light: #243b55;
    --gold: #f5c842;
    --gold-dark: #d4a91e;
    --red: #c0392b;
    --white: #f8f6f0;
    --slate: #8fa3b1;
    --success: #27ae60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    font-family: 'Barlow', sans-serif;
    color: var(--white);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(245,200,66,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(192,57,43,0.08) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.02) 60px);
  }

  header { text-align: center; padding: 48px 24px 32px; }

  .diamond-icon {
    display: inline-block; width: 52px; height: 52px;
    background: var(--gold); transform: rotate(45deg);
    margin-bottom: 20px; position: relative;
    box-shadow: 0 0 30px rgba(245,200,66,0.3);
  }
  .diamond-icon::after {
    content: '🥎'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-45deg); font-size: 22px; line-height: 1;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 7vw, 64px); font-weight: 900;
    letter-spacing: 0.04em; text-transform: uppercase; line-height: 0.9; color: var(--white);
  }
  h1 span { color: var(--gold); display: block; }

  .subtitle { margin-top: 12px; font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--slate); font-weight: 600; }
  .rule { width: 60px; height: 3px; background: var(--gold); margin: 20px auto 0; }
  .container { max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }

  .loading-bar { text-align: center; padding: 60px 20px; color: var(--slate); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 0.15em; text-transform: uppercase; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid rgba(245,200,66,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .day-block { margin-bottom: 36px; }
  .day-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .day-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.25); padding: 5px 14px; border-radius: 2px; }
  .day-divider { flex: 1; height: 1px; background: linear-gradient(to right, rgba(245,200,66,0.2), transparent); }

  .game-card { background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s; }
  .game-card:hover { border-color: rgba(245,200,66,0.2); }

  .game-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--navy-light); gap: 12px; flex-wrap: wrap; cursor: pointer; user-select: none; }
  .game-header:hover { background: #2a4060; }
  .game-header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex: 1; }

  .game-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--white); }
  .game-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .badge { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; border-radius: 2px; }
  .badge-age { background: rgba(192,57,43,0.25); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
  .badge-field { background: rgba(39,174,96,0.2); color: #2ecc71; border: 1px solid rgba(39,174,96,0.25); }
  .badge-time { background: rgba(245,200,66,0.12); color: var(--gold); border: 1px solid rgba(245,200,66,0.2); }

  .chevron { font-size: 12px; color: var(--slate); transition: transform 0.25s ease; flex-shrink: 0; margin-left: 4px; }
  .game-card.open .chevron { transform: rotate(180deg); }
  .game-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .game-card.open .game-body { max-height: 900px; }

  .slots-area { padding: 16px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }

  .slot { position: relative; border: 1.5px dashed rgba(255,255,255,0.12); border-radius: 4px; padding: 10px 14px; min-height: 52px; display: flex; align-items: center; gap: 10px; transition: all 0.2s; background: rgba(255,255,255,0.02); }
  .slot.filled { border-style: solid; border-color: rgba(245,200,66,0.3); background: rgba(245,200,66,0.05); }

  .slot-number { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: rgba(255,255,255,0.12); min-width: 22px; line-height: 1; transition: color 0.2s; }
  .slot.filled .slot-number { color: var(--gold); }
  .slot-content { flex: 1; min-width: 0; }
  .slot-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate); font-weight: 600; margin-bottom: 2px; }
  .slot-name { font-size: 14px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot-empty-text { font-size: 13px; color: rgba(255,255,255,0.25); font-style: italic; }

  .slot-remove { background: none; border: none; color: rgba(255,255,255,0.25); cursor: pointer; font-size: 16px; padding: 2px 4px; line-height: 1; border-radius: 2px; transition: all 0.15s; flex-shrink: 0; }
  .slot-remove:hover { color: var(--red); background: rgba(192,57,43,0.15); }

  .signup-bar { padding: 12px 20px 16px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; align-items: center; }

  .name-input { flex: 1; background: var(--navy); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 9px 14px; font-size: 14px; font-family: 'Barlow', sans-serif; color: var(--white); outline: none; transition: border-color 0.2s; min-width: 0; }
  .name-input::placeholder { color: rgba(255,255,255,0.25); }
  .name-input:focus { border-color: var(--gold); background: rgba(245,200,66,0.04); }

  .btn-signup { background: var(--gold); color: var(--navy); border: none; padding: 9px 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .btn-signup:hover { background: var(--gold-dark); transform: translateY(-1px); }
  .btn-signup:active { transform: translateY(0); }
  .btn-signup:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .full-tag { padding: 12px 20px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
  .full-badge { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--success); background: rgba(39,174,96,0.12); border: 1px solid rgba(39,174,96,0.25); padding: 4px 12px; border-radius: 2px; }

  .exp-section { padding: 0 20px 14px; border-top: 1px dashed rgba(124,179,255,0.15); }
  .exp-section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: #7cb3ff; margin: 12px 0 10px; display: flex; align-items: center; gap: 8px; }
  .exp-section-label::after { content: ''; flex: 1; height: 1px; background: rgba(124,179,255,0.15); }

  .slot.exp-slot { border-color: rgba(124,179,255,0.2); background: rgba(124,179,255,0.03); }
  .slot.exp-slot.filled { border-color: rgba(124,179,255,0.4); background: rgba(124,179,255,0.08); }
  .slot.exp-slot .slot-number { color: rgba(124,179,255,0.25); }
  .slot.exp-slot.filled .slot-number { color: #7cb3ff; }

  .exp-signup-bar { padding: 0 20px 16px; display: flex; gap: 10px; align-items: center; }

  .btn-signup-exp { background: transparent; color: #7cb3ff; border: 1.5px solid rgba(124,179,255,0.4); padding: 9px 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .btn-signup-exp:hover { background: rgba(124,179,255,0.1); border-color: #7cb3ff; transform: translateY(-1px); }
  .btn-signup-exp:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .name-input-exp { flex: 1; background: var(--navy); border: 1.5px solid rgba(124,179,255,0.15); border-radius: 4px; padding: 9px 14px; font-size: 14px; font-family: 'Barlow', sans-serif; color: var(--white); outline: none; transition: border-color 0.2s; min-width: 0; }
  .name-input-exp::placeholder { color: rgba(255,255,255,0.25); }
  .name-input-exp:focus { border-color: #7cb3ff; background: rgba(124,179,255,0.04); }

  .count-pill { font-size: 11px; background: rgba(255,255,255,0.07); color: var(--slate); padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .count-pill.has-signups { background: rgba(245,200,66,0.15); color: var(--gold); }

  /* PIN Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; z-index: 200; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal { background: var(--navy-light); border: 1px solid rgba(245,200,66,0.25); border-radius: 8px; padding: 28px 28px 24px; width: 300px; max-width: 90vw; text-align: center; transform: translateY(-12px); transition: transform 0.2s; }
  .modal-overlay.show .modal { transform: translateY(0); }

  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--white); margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--slate); margin-bottom: 18px; }
  .modal-sub strong { color: var(--white); }

  .pin-input { width: 100%; background: var(--navy); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 10px 14px; font-size: 24px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.3em; color: var(--gold); text-align: center; outline: none; transition: border-color 0.2s; margin-bottom: 14px; }
  .pin-input:focus { border-color: var(--gold); }
  .pin-input.error { border-color: var(--red); animation: shake 0.3s ease; }

  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  .modal-buttons { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; background: transparent; border: 1.5px solid rgba(255,255,255,0.15); color: var(--slate); padding: 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .btn-cancel:hover { border-color: rgba(255,255,255,0.3); color: var(--white); }
  .btn-confirm { flex: 1; background: var(--red); border: none; color: var(--white); padding: 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .btn-confirm:hover { background: #a93226; }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--gold); color: var(--navy); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 24px; border-radius: 4px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.is-error { background: var(--red); color: var(--white); }

  @media (max-width: 500px) {
    .slots-area { grid-template-columns: 1fr 1fr; }
    .game-header, .slots-area { padding: 12px 14px; }
    .signup-bar { padding: 10px 14px 14px; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="diamond-icon"></div>
  <h1>SRGS SCRIMMAGE WEEK<span>Umpire Sign-Up</span></h1>
  <p class="subtitle">Up to 4 umpires + 1 experienced umpire per game</p>
  <div class="rule"></div>
</header>

<div class="container" id="app">
  <div class="loading-bar"><div class="spinner"></div><br>Loading schedule...</div>
</div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="pinModal">
  <div class="modal">
    <div class="modal-title">Admin Required</div>
    <div class="modal-sub" id="modalSub">Enter PIN to remove <strong></strong></div>
    <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••"
      onkeydown="if(event.key==='Enter') confirmPin()">
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmPin()">Remove</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ubbhxfakfkzawfuqrovt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViYmh4ZmFrZmt6YXdmdXFyb3Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzczMzUsImV4cCI6MjA4ODY1MzMzNX0.GHoBvl7XvqTAS3wfGN-Hg-01hX14H-cSIfnv6yFml9o';
const ADMIN_PIN    = '1031';
const MAX_UMPIRES  = 4;

const SCHEDULE = [
  {
    day: "Monday, March 9",
    games: [
      { id: "mon-1", age: "8U",  field: "BH 1", time: "4:00 – 5:30 PM" },
      { id: "mon-2", age: "8U",  field: "BH 2", time: "5:30 – 7:00 PM" },
      { id: "mon-3", age: "10U", field: "BH 1", time: "5:30 – 7:00 PM" },
    ]
  },
  {
    day: "Wednesday, March 11",
    games: [
      { id: "wed-1", age: "10U", field: "BH 2", time: "5:30 – 7:00 PM" },
    ]
  }
];

// ── Supabase helpers ─────────────────────────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

const loadSignups  = ()           => sbFetch('signups?select=*&order=created_at.asc');
const insertSignup = (game_id, name, is_exp) => sbFetch('signups', { method: 'POST', body: JSON.stringify({ game_id, name, is_exp }) });
const deleteSignup = (id)         => sbFetch(`signups?id=eq.${id}`, { method: 'DELETE' });

// ── State ─────────────────────────────────────────────────────────
let allSignups     = [];
const expandedGames = new Set();
let pendingRemove  = null;

const getRegular = (gameId) => allSignups.filter(r => r.game_id === gameId && !r.is_exp);
const getExp     = (gameId) => allSignups.find(r  => r.game_id === gameId &&  r.is_exp) || null;

// ── Render ────────────────────────────────────────────────────────
function renderGame(game) {
  const list   = getRegular(game.id);
  const expUmp = getExp(game.id);
  const isFull = list.length >= MAX_UMPIRES;
  const isOpen = expandedGames.has(game.id);

  const slots = Array.from({ length: MAX_UMPIRES }, (_, i) => {
    const u = list[i];
    return u
      ? `<div class="slot filled">
           <div class="slot-number">${i + 1}</div>
           <div class="slot-content">
             <div class="slot-label">Umpire</div>
             <div class="slot-name">${esc(u.name)}</div>
           </div>
           <button class="slot-remove" onclick="promptRemove('${u.id}','${esc(u.name)}','${game.id}')">×</button>
         </div>`
      : `<div class="slot">
           <div class="slot-number">${i + 1}</div>
           <div class="slot-content"><div class="slot-empty-text">Open slot</div></div>
         </div>`;
  }).join('');

  const expSlot = expUmp
    ? `<div class="slot exp-slot filled">
         <div class="slot-number">★</div>
         <div class="slot-content">
           <div class="slot-label">Experienced Umpire</div>
           <div class="slot-name">${esc(expUmp.name)}</div>
         </div>
         <button class="slot-remove" onclick="promptRemove('${expUmp.id}','${esc(expUmp.name)}','${game.id}')">×</button>
       </div>`
    : `<div class="slot exp-slot">
         <div class="slot-number" style="color:rgba(124,179,255,0.2)">★</div>
         <div class="slot-content"><div class="slot-empty-text">Open slot</div></div>
       </div>`;

  const pill = `<span class="count-pill ${list.length > 0 ? 'has-signups' : ''}">${list.length}/${MAX_UMPIRES} umpires${expUmp ? ' · ★ exp' : ''}</span>`;

  return `<div class="game-card ${isOpen ? 'open' : ''}" id="card-${game.id}">
    <div class="game-header" onclick="toggleGame('${game.id}')">
      <div class="game-header-left">
        <div class="game-title">${game.age} · ${game.field}</div>
        <div class="game-meta">
          <span class="badge badge-age">${game.age}</span>
          <span class="badge badge-field">${game.field}</span>
          <span class="badge badge-time">${game.time}</span>
          ${pill}
        </div>
      </div>
      <span class="chevron">▼</span>
    </div>
    <div class="game-body">
      <div class="slots-area">${slots}</div>
      ${isFull
        ? `<div class="full-tag"><span class="full-badge">✓ All umpire slots filled</span></div>`
        : `<div class="signup-bar">
             <input class="name-input" id="input-${game.id}" type="text" placeholder="Your name..." maxlength="40"
               onkeydown="if(event.key==='Enter')handleSignup('${game.id}')">
             <button class="btn-signup" id="btn-${game.id}" onclick="handleSignup('${game.id}')">Sign Up</button>
           </div>`}
      <div class="exp-section">
        <div class="exp-section-label">★ Experienced Umpire</div>
        <div class="slots-area" style="padding:0 0 10px">${expSlot}</div>
        ${!expUmp
          ? `<div class="exp-signup-bar">
               <input class="name-input-exp" id="exp-input-${game.id}" type="text" placeholder="Experienced umpire name..." maxlength="40"
                 onkeydown="if(event.key==='Enter')handleExpSignup('${game.id}')">
               <button class="btn-signup-exp" id="exp-btn-${game.id}" onclick="handleExpSignup('${game.id}')">Sign Up</button>
             </div>`
          : `<div style="padding:0 0 14px"><span class="full-badge" style="color:#7cb3ff;background:rgba(124,179,255,0.1);border-color:rgba(124,179,255,0.25)">✓ Slot filled</span></div>`}
      </div>
    </div>
  </div>`;
}

function renderAll() {
  document.getElementById('app').innerHTML = SCHEDULE.map(day => `
    <div class="day-block">
      <div class="day-header">
        <span class="day-label">${day.day}</span>
        <div class="day-divider"></div>
      </div>
      ${day.games.map(renderGame).join('')}
    </div>`).join('');
}

// ── Sign-up handlers ──────────────────────────────────────────────
async function handleSignup(gameId) {
  const input = document.getElementById(`input-${gameId}`);
  const btn   = document.getElementById(`btn-${gameId}`);
  const name  = input.value.trim();
  if (!name) { flashError(input); return; }
  if (getRegular(gameId).length >= MAX_UMPIRES) { toast('Game is already full!', true); return; }
  btn.disabled = true;
  try {
    const rows = await insertSignup(gameId, name, false);
    allSignups.push(rows[0]);
    expandedGames.add(gameId);
    toast(`✓ ${name} signed up!`);
    renderAll();
  } catch { toast('Error saving — try again', true); btn.disabled = false; }
}

async function handleExpSignup(gameId) {
  const input = document.getElementById(`exp-input-${gameId}`);
  const btn   = document.getElementById(`exp-btn-${gameId}`);
  const name  = input.value.trim();
  if (!name) { flashError(input); return; }
  if (getExp(gameId)) { toast('Experienced slot already filled!', true); return; }
  btn.disabled = true;
  try {
    const rows = await insertSignup(gameId, name, true);
    allSignups.push(rows[0]);
    expandedGames.add(gameId);
    toast(`★ ${name} signed up as experienced umpire!`);
    renderAll();
  } catch { toast('Error saving — try again', true); btn.disabled = false; }
}

// ── PIN modal ─────────────────────────────────────────────────────
function promptRemove(rowId, name, gameId) {
  pendingRemove = { rowId, name, gameId };
  document.getElementById('modalSub').innerHTML = `Enter PIN to remove <strong>${esc(name)}</strong>`;
  document.getElementById('pinInput').value = '';
  document.getElementById('pinInput').classList.remove('error');
  document.getElementById('pinModal').classList.add('show');
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}

function closeModal() {
  document.getElementById('pinModal').classList.remove('show');
  pendingRemove = null;
}

async function confirmPin() {
  const entered = document.getElementById('pinInput').value;
  if (entered !== ADMIN_PIN) {
    const inp = document.getElementById('pinInput');
    inp.classList.add('error'); inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 400);
    toast('Incorrect PIN', true);
    return;
  }
  const { rowId, name, gameId } = pendingRemove;
  closeModal();
  try {
    await deleteSignup(rowId);
    allSignups = allSignups.filter(r => r.id !== rowId);
    expandedGames.add(gameId);
    toast(`${name} removed`);
    renderAll();
  } catch { toast('Error removing — try again', true); }
}

document.getElementById('pinModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ── Helpers ───────────────────────────────────────────────────────
function toggleGame(id) {
  expandedGames.has(id) ? expandedGames.delete(id) : expandedGames.add(id);
  renderAll();
}

function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('is-error', isErr);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

function flashError(input) {
  input.style.borderColor = 'var(--red)';
  setTimeout(() => input.style.borderColor = '', 600);
  input.focus();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  try {
    allSignups = await loadSignups();
    renderAll();
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="loading-bar" style="color:#e74c3c">⚠ Could not connect to database.<br>Check your Supabase configuration.</div>`;
    console.error(e);
  }
}

init();
</script>
</body>
</html>
